<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Ball Bouncer — interactive physics playground. Launch balls inside spinning geometric shapes, tweak gravity, spin, fog trails and sounds in real time.">
    <meta name="keywords" content="ball bouncer, physics simulation, bouncing balls, geometric shapes, canvas game, interactive animation, particle physics">
    <meta property="og:title" content="Ball Bouncer">
    <meta property="og:description" content="Interactive physics playground — balls bouncing inside spinning shapes with customizable gravity, sounds and visual effects.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <title>Ball Bouncer</title>
    <link rel="icon" id="favicon" type="image/png">
    <script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        :root {
            --accent:#00d4ff;
            --accent-glow15:rgba(0,212,255,.15);
            --accent-glow70:rgba(0,212,255,.70);
            --panel-bg:#07071a;
            --panel-border:#111128;
            --track-empty:#1a2a40;
            --ball-rtl-dur:3s;
            --logo-sweep-dur:3s;
            --title-sweep-dur:6s;
            --title-glow-dur:4s;
            --icon-ball-dur:8s;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background:#050510;
            display:flex;
            height:100vh;
            overflow:hidden;
            font-family:'Segoe UI', system-ui, sans-serif;
        }

        canvas { display:block; flex:1; }
        #canvas-logo {
            position:fixed; pointer-events:none; white-space:nowrap;
            font-weight:bold; font-family:'Segoe UI',system-ui,sans-serif;
            background:linear-gradient(90deg,#ff66aa,#66ccff,#88ffcc,#ff66aa);
            background-size:300% 100%;
            -webkit-background-clip:text; background-clip:text; color:transparent;
            filter:drop-shadow(0 0 10px rgba(160,220,255,.85));
            animation:logoColorSweep var(--logo-sweep-dur) linear infinite;
        }
        @keyframes logoColorSweep {
            0%{background-position:0% center}100%{background-position:300% center}
        }
        .rnd-row { display:flex; gap:6px; margin-top:6px; }
        .rnd-row .toggle-row { flex:1; font-size:8px; padding:2px 0; margin-top:0; }

        /* ── Ad column ─────────────────────────────────── */
        #ad-left {
            width:160px; flex-shrink:0;
            background:#060616;
            border-right:1px solid #0e1628;
            display:flex; flex-direction:column; align-items:center;
            padding:14px 10px; gap:14px; overflow:hidden;
        }
        @media (max-width:960px) { #ad-left { display:none; } }

        .ad-label {
            font-size:8px; letter-spacing:.22em; text-transform:uppercase;
            color:#18263a; width:100%; text-align:center;
        }
        .ad-placeholder {
            width:140px; height:300px;
            border:1px dashed #131326; border-radius:6px;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:8px;
        }
        .ad-placeholder-icon { font-size:22px; opacity:.15; }
        .ad-placeholder span { font-size:9px; color:#18263a; text-align:center; line-height:1.7; letter-spacing:.08em; }

        /* ── Panel ─────────────────────────────────────── */
        #panel {
            width:220px; flex-shrink:0; position:relative;
            background:var(--panel-bg);
            border-left:1px solid var(--panel-border);
            padding:10px 8px 8px;
            display:flex; flex-direction:column; gap:7px;
            overflow-y:auto;
        }
        /* Subtle top accent fade */
        #panel::before {
            content:'';
            position:absolute; top:0; left:0; right:0; height:36px;
            background:linear-gradient(to bottom, rgba(0,212,255,.05), transparent);
            pointer-events:none; z-index:0;
        }
        /* Custom scrollbar */
        #panel::-webkit-scrollbar { width:3px; }
        #panel::-webkit-scrollbar-track { background:transparent; }
        #panel::-webkit-scrollbar-thumb { background:#1a2a40; border-radius:2px; }
        #panel::-webkit-scrollbar-thumb:hover { background:var(--accent); }

        /* ── Logo ──────────────────────────────────────── */
        #logo {
            display:flex; align-items:center; justify-content:center;
            gap:8px; padding-bottom:2px; position:relative; z-index:1;
        }
        @keyframes iconBallRainbow {
            0%   { fill:hsl(0,85%,68%);   }
            16%  { fill:hsl(60,85%,68%);  }
            33%  { fill:hsl(120,85%,68%); }
            50%  { fill:hsl(180,85%,68%); }
            66%  { fill:hsl(240,85%,68%); }
            83%  { fill:hsl(300,85%,68%); }
            100% { fill:hsl(360,85%,68%); }
        }
        .cross-ball { animation:iconBallRainbow var(--icon-ball-dur) linear infinite; }
        @keyframes ballRainbowRTL {
            0%   { background-position: 200% center; }
            100% { background-position: -100% center; }
        }
        .logo-ball {
            width:22px; height:22px; border-radius:50%;
            flex-shrink:0; position:relative; overflow:hidden;
            box-shadow: 2px 4px 10px rgba(0,0,0,.8), 0 0 0 0.5px rgba(255,255,255,.08);
        }
        .logo-ball::before {
            content:''; position:absolute; inset:0;
            background: linear-gradient(270deg,
                hsl(0,90%,58%), hsl(60,90%,58%), hsl(120,90%,58%),
                hsl(180,90%,58%), hsl(240,90%,60%), hsl(300,90%,58%), hsl(360,90%,58%));
            background-size:300% 100%;
            animation:ballRainbowRTL var(--ball-rtl-dur) linear infinite;
        }
        .logo-ball::after {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle at 33% 28%,
                rgba(255,255,255,.88) 0%,
                rgba(255,255,255,.10) 38%,
                rgba(0,0,0,0) 54%,
                rgba(0,0,0,.42) 100%);
        }
        @keyframes logoTextSweep {
            0%   { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }
        @keyframes logoTextGlow {
            0%,100% { filter: drop-shadow(0 0 7px rgba(129,140,248,.8)) drop-shadow(0 0 2px rgba(129,140,248,.4)); }
            33%     { filter: drop-shadow(0 0 9px rgba(56,189,248,.9))  drop-shadow(0 0 2px rgba(56,189,248,.5)); }
            66%     { filter: drop-shadow(0 0 8px rgba(255,100,220,.8)) drop-shadow(0 0 2px rgba(255,100,220,.4)); }
        }
        .logo-title {
            font-size:19px; font-weight:800; letter-spacing:.06em; line-height:1;
            background: linear-gradient(90deg,
                #818cf8, #38bdf8, #00ffcc, #ffdd00, #ff66cc, #818cf8, #38bdf8);
            background-size: 300% 100%;
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text;
            animation: logoTextSweep var(--title-sweep-dur) linear infinite, logoTextGlow var(--title-glow-dur) ease-in-out infinite;
        }
        .rnd-themes-btn {
            width:100%; padding:5px 8px; margin-top:6px;
            background:rgba(0,180,255,.07); border:1px solid rgba(0,180,255,.2);
            border-radius:6px; color:rgba(160,200,230,.65);
            font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
            cursor:pointer; transition:background .2s, border-color .2s, color .2s;
        }
        .rnd-themes-btn:hover { background:rgba(0,180,255,.16); border-color:rgba(0,180,255,.5); color:#e0f4ff; }
        .rnd-themes-btn.active { background:rgba(0,212,255,.22); border-color:#00d4ff; color:#00d4ff; }

        /* ── Toggle rows ────────────────────────────────────── */
        .toggle-row {
            display:flex; align-items:center; justify-content:space-between;
            margin-top:4px; padding:3px 0; cursor:pointer; user-select:none;
            color:rgba(160,200,230,.55); font-size:10px; font-weight:600;
            letter-spacing:.08em; text-transform:uppercase; transition:color .2s;
        }
        .toggle-row:hover { color:#e0f4ff; }
        .hole-controls {
            display:flex; align-items:center; gap:5px;
            padding:1px 0 5px;
            font-size:9px; color:rgba(160,200,230,.55);
            letter-spacing:.05em; text-transform:uppercase;
        }
        .hole-ctrl-slider { flex:1; min-width:0; }
        .hole-cycle-btn {
            flex-shrink:0;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:4px; color:#2e5070; font-size:13px; cursor:pointer;
            width:22px; height:20px; padding:0; line-height:1;
            display:flex; align-items:center; justify-content:center;
            transition:border-color .15s, color .15s, background .15s;
        }
        .hole-cycle-btn:hover { border-color:#006688; color:var(--accent); background:#0d1830; }
        .lang-select {
            width:100%; padding:4px 6px; margin-top:2px;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:5px; color:#3a5468;
            font-size:10px; font-weight:600; letter-spacing:.06em;
            cursor:pointer; outline:none;
            transition:border-color .15s, color .15s;
        }
        .lang-select:hover, .lang-select:focus { border-color:#006688; color:var(--accent); }
        .toggle-switch {
            position:relative; width:36px; height:20px; flex-shrink:0;
        }
        .toggle-switch input {
            opacity:0; width:0; height:0; position:absolute; pointer-events:none;
        }
        .toggle-track {
            position:absolute; inset:0;
            background:rgba(0,180,255,.08); border:1px solid rgba(0,180,255,.18);
            border-radius:10px; transition:background .2s, border-color .2s;
        }
        .toggle-switch input:checked + .toggle-track {
            background:rgba(0,212,255,.25); border-color:#00d4ff;
        }
        .toggle-thumb {
            position:absolute; top:3px; left:3px;
            width:14px; height:14px; border-radius:50%;
            background:#2a3e52; box-shadow:0 1px 3px rgba(0,0,0,.5);
            transition:left .18s cubic-bezier(.4,0,.2,1), background .18s;
            pointer-events:none;
        }
        .toggle-switch input:checked ~ .toggle-thumb {
            left:19px; background:#00d4ff;
            box-shadow:0 0 8px rgba(0,212,255,.6), 0 1px 3px rgba(0,0,0,.4);
        }

        /* ── Direction buttons ──────────────────────────────── */
        .dir-btn {
            flex:1; height:26px; padding:0 6px;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:6px; color:#3a5468; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:6px;
            font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
            transition:border-color .15s, color .15s, background .15s;
        }
        .dir-btn:hover { border-color:#006688; color:var(--accent); background:#0d1830; }
        .dir-btn:active { transform:scale(0.95); }
        .dir-label {
            display:inline-block; padding:1px 6px;
            border:1px solid rgba(160,200,230,.3); border-radius:3px;
            font-size:9px; font-weight:800; letter-spacing:.03em;
            color:var(--accent); background:rgba(0,180,255,.12);
            flex-shrink:0;
        }

        /* ── Sound section ──────────────────────────────── */
        #sound-section { display:flex; flex-direction:column; gap:5px; }
        #audio-bar { display:flex; flex-direction:column; gap:5px; }
        .audio-row { display:flex; align-items:center; gap:7px; }
        .mute-btn {
            flex-shrink:0; position:relative; overflow:hidden;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:6px; cursor:pointer; line-height:1;
            width:28px; height:24px;
            display:flex; align-items:center; justify-content:center;
            transition:border-color .15s, background .15s;
        }
        .mute-btn:hover { border-color:#006688; background:#0d1830; }
        .mute-btn.muted { border-color:#3a1010; }
        .mute-btn.muted .btn-icon { opacity:.35; }
        .mute-btn .mute-slash { display:none; position:absolute; inset:0; pointer-events:none; }
        .mute-btn .mute-slash::before {
            content:''; position:absolute; width:2px; height:calc(100% + 8px);
            background:#cc1111; border-radius:1px; top:-4px; left:50%;
            transform:translateX(-50%) rotate(-40deg);
        }
        .mute-btn.muted .mute-slash { display:block; }
        #muteBtn     .btn-icon { color:#aaddee; font-size:15px; }
        #ballMuteBtn .btn-icon { color:#5588aa; font-size:17px; }

        /* ── Action row (Pause + Reset) ─────────────────── */
        .action-row { display:flex; gap:6px; }

        #pauseBtn {
            flex-shrink:0;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:6px; color:#3a6080; cursor:pointer;
            width:34px; height:28px; padding:0;
            display:flex; align-items:center; justify-content:center;
            transition:border-color .15s, color .15s, background .15s;
        }
        #pauseBtn svg { display:block; }
        #pauseBtn:hover { border-color:#006688; color:var(--accent); background:#0d1830; }
        #pauseBtn.paused {
            border-color:var(--accent);
            color:var(--accent);
            background:rgba(0,212,255,.08);
            box-shadow:0 0 8px rgba(0,212,255,.12);
        }

        #resetBtn {
            flex:1;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:6px; color:#2e5070;
            font-size:9px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
            padding:4px 10px; cursor:pointer;
            transition:border-color .15s, color .15s, background .15s;
        }
        #resetBtn:hover { border-color:#2a4060; color:var(--accent); background:#0d1830; }

        /* ── Separator ──────────────────────────────────── */
        hr.sep {
            border:none;
            border-top:1px solid rgba(255,255,255,.04);
            box-shadow:0 1px 0 rgba(0,0,0,.25);
            margin:0;
        }

        /* ── Section headers ────────────────────────────── */
        .sec-title {
            font-size:9px; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
            color:#3a5468; margin-bottom:5px;
            position:relative; padding-left:9px;
        }
        .sec-title::before {
            content:'';
            position:absolute; left:0; top:50%;
            transform:translateY(-50%);
            width:2px; height:10px;
            background:var(--accent); border-radius:1px; opacity:.45;
        }
        .sec-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:5px;
        }
        .sec-header .sec-title { margin-bottom:0; }

        .rnd-btn {
            flex-shrink:0;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:4px; color:#2e5070; font-size:13px; cursor:pointer;
            width:22px; height:20px; padding:0; line-height:1;
            display:flex; align-items:center; justify-content:center;
            transition:border-color .15s, color .15s, background .15s;
        }
        .rnd-btn:hover {
            border-color:#006688; color:var(--accent); background:#0d1830;
        }

        /* ── Shape grids ────────────────────────────────── */
        #shape-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:3px; }
        #cross-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:3px; }
        /* explicit height so 3-row grids don't overflow panel */

        .shape-btn {
            height:22px;
            background:#0b1222; border:1.5px solid #162030;
            border-radius:4px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            padding:0;
            transition:border-color .15s, background .15s, box-shadow .15s;
        }
        .shape-btn:hover  { border-color:#1e4060; background:#0d1a28; }
        .shape-btn.active {
            border-color:var(--accent); background:#081522;
            box-shadow:0 0 10px var(--accent-glow15), inset 0 0 6px rgba(0,212,255,.06);
        }
        #shape-grid .shape-btn svg { width:14px; height:14px; display:block; }
        #cross-grid .shape-btn svg { width:15px; height:15px; display:block; }
        .shape-btn polygon,
        .shape-btn circle { stroke:#2e5570; fill:none; stroke-width:1.8; stroke-linejoin:round; }
        .shape-btn.active polygon,
        .shape-btn.active circle { stroke:var(--accent); filter:drop-shadow(0 0 2px var(--accent)); }

        /* ── Sliders ────────────────────────────────────── */
        .ctrl label {
            display:flex; justify-content:space-between; align-items:baseline;
            font-size:9px; letter-spacing:.13em; text-transform:uppercase;
            color:#2e4455; margin-bottom:4px;
        }
        .ctrl label span { color:var(--accent); font-size:12px; font-weight:700; letter-spacing:0; }
        input[type=range] {
            -webkit-appearance:none; appearance:none;
            width:100%; height:3px; border-radius:2px; outline:none; cursor:pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:12px; height:12px; border-radius:50%;
            background:var(--accent);
            box-shadow:0 0 7px var(--accent-glow70), 0 0 2px rgba(0,0,0,.6);
            cursor:pointer;
            transition:transform .1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.2); }
        input[type=range]::-moz-range-thumb {
            width:12px; height:12px; border:none; border-radius:50%;
            background:var(--accent); box-shadow:0 0 7px var(--accent-glow70); cursor:pointer;
        }

        /* ── Paired sliders ─────────────────────────────── */
        .ctrl-pair { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

        /* ── Swatch grids ───────────────────────────────── */
        #theme-grid, #ball-theme-grid, #fog-theme-grid {
            display:flex; flex-wrap:wrap; gap:5px;
        }
        .theme-swatch {
            width:24px; height:24px; border-radius:50%; cursor:pointer;
            border:2px solid transparent;
            transition:transform .15s, border-color .15s, box-shadow .15s;
            outline:none;
        }
        .theme-swatch:hover { transform:scale(1.18); }
        .theme-swatch.active {
            border-color:#fff;
            box-shadow:0 0 0 1px rgba(255,255,255,.15), 0 0 8px rgba(255,255,255,.2);
        }
    </style>
</head>
<body>

<!-- ── Ad column ─────────────────────────────────────────────── -->
<div id="ad-left">
    <div class="ad-label">Sponsored</div>

<canvas id="c"></canvas>
<div id="canvas-logo">Ball Bouncer</div>

<!-- ── Control panel ──────────────────────────────────────────── -->
<div id="panel">

    <!-- Logo -->
    <div id="logo">
        <div class="logo-ball"></div>
        <div class="logo-title">Ball Bouncer</div>
    </div>

    <!-- Sound -->
    <div id="sound-section">
        <div class="sec-title" data-i18n="sound">Sound</div>
        <div id="audio-bar">
            <div class="audio-row">
                <button id="muteBtn" class="mute-btn" title="Toggle music">
                    <span class="btn-icon">&#9835;</span>
                    <span class="mute-slash"></span>
                </button>
                <input type="range" id="sVolume" min="0" max="100" value="10" title="Music volume">
            </div>
            <div class="audio-row">
                <button id="ballMuteBtn" class="mute-btn" title="Toggle ball sounds">
                    <span class="btn-icon">&#9679;</span>
                    <span class="mute-slash"></span>
                </button>
                <input type="range" id="sBallSound" min="0" max="100" value="2" title="Ball hit volume">
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
        <button id="pauseBtn" title="Pause simulation">
            <svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor">
                <rect x="0.5" y="0.5" width="3.5" height="12" rx="1.5"/>
                <rect x="7" y="0.5" width="3.5" height="12" rx="1.5"/>
            </svg>
        </button>
        <button id="resetBtn">&#10227; Reset</button>
    </div>

    <hr class="sep">

    <!-- Shape -->
    <div>
        <div class="sec-header">
            <div class="sec-title" data-i18n="shape">Shape</div>
            <button class="rnd-btn" id="rndShape" title="Random shape">&#8635;</button>
        </div>
        <div id="shape-grid"></div>
        <div class="ctrl-pair" style="margin-top:6px">
            <div class="ctrl">
                <label>Size <span id="vShapeSize">55</span></label>
                <input type="range" id="sShapeSize" min="1" max="100" value="55">
            </div>
            <div class="ctrl">
                <label>Speed <span id="vShapeSpeed">5</span></label>
                <input type="range" id="sShapeSpeed" min="1" max="20" value="5">
            </div>
        </div>
    </div>

    <hr class="sep">

    <!-- Direction controls -->
    <div class="ctrl-pair" style="margin:0">
        <button id="dirShape" class="dir-btn" title="Reverse shape rotation">
            <span id="dirShapeLabel" class="dir-label">R</span>Shape
        </button>
        <button id="dirCross" class="dir-btn" title="Reverse cross rotation">
            <span id="dirCrossLabel" class="dir-label">L</span>Cross
        </button>
    </div>

    <hr class="sep">

    <!-- Cross -->
    <div>
        <div class="sec-title" data-i18n="cross">Cross</div>
        <div id="cross-grid"></div>
        <div class="ctrl-pair" style="margin-top:6px">
            <div class="ctrl">
                <label>Size <span id="vCrossSize">50</span></label>
                <input type="range" id="sCrossSize" min="1" max="100" value="50">
            </div>
            <div class="ctrl">
                <label>Speed <span id="vCrossSpeed">3</span></label>
                <input type="range" id="sCrossSpeed" min="0" max="20" value="3">
            </div>
        </div>
        <label class="toggle-row">
            <span data-i18n="crossHole">Cross Hole</span>
            <span class="toggle-switch">
                <input type="checkbox" id="crossHoleCheck">
                <span class="toggle-track"></span>
                <span class="toggle-thumb"></span>
            </span>

// ── Computed shape point generators ───────────────────────────
function makeGearPts(teeth = 8, outer = 1.0, inner = 0.72) {
    const step = Math.PI * 2 / teeth, half = step * 0.25;
    const pts = [];
    for (let i = 0; i < teeth; i++) {
        const c = i * step - Math.PI / 2;
        pts.push([Math.cos(c - half) * inner, Math.sin(c - half) * inner]);
        pts.push([Math.cos(c - half) * outer, Math.sin(c - half) * outer]);
        pts.push([Math.cos(c + half) * outer, Math.sin(c + half) * outer]);
        pts.push([Math.cos(c + half) * inner, Math.sin(c + half) * inner]);
    }
    return pts;
}

function makeCrescentPts() {
    const outerR = 1.0, innerR = 0.72, dx = -0.38;
    const ix = (1 + dx * dx - innerR * innerR) / (2 * dx);
    const iy = Math.sqrt(Math.max(0, 1 - ix * ix));
    const pts = [];
    const a0 = Math.atan2(-iy, ix), a1 = Math.atan2(iy, ix);
    let span = a1 - a0; if (span <= 0) span += Math.PI * 2;
    for (let i = 0; i <= 10; i++) {
        const a = a0 + span * i / 10;
        pts.push([Math.cos(a) * outerR, Math.sin(a) * outerR]);
    }
    const b0 = Math.atan2(iy, ix - dx), b1 = Math.atan2(-iy, ix - dx);
    let ispan = b1 - b0; if (ispan <= 0) ispan += Math.PI * 2;
    for (let i = 0; i <= 6; i++) {
        const a = b0 + ispan * i / 6;
        pts.push([dx + Math.cos(a) * innerR, Math.sin(a) * innerR]);
    }
    return pts;
}

function makeSnowflakePts() {
    const pts = [];
    const arms = 6, step = Math.PI * 2 / arms, sa = -Math.PI / 2;
    for (let i = 0; i < arms; i++) {
        const a = sa + i * step;
        const px = Math.sin(a), py = -Math.cos(a);
        pts.push([Math.cos(a - Math.PI/6) * 0.65, Math.sin(a - Math.PI/6) * 0.65]);
        pts.push([Math.cos(a) * 0.58 + px * 0.09,  Math.sin(a) * 0.58 + py * 0.09]);
        pts.push([Math.cos(a),                      Math.sin(a)]);
        pts.push([Math.cos(a) * 0.58 - px * 0.09,  Math.sin(a) * 0.58 - py * 0.09]);
        pts.push([Math.cos(a + Math.PI/6) * 0.65,  Math.sin(a + Math.PI/6) * 0.65]);
        pts.push([Math.cos(a + step/2) * 0.15,     Math.sin(a + step/2) * 0.15]);
    }
    return pts;
}

function makePinwheelPts() {
    const pts = [];
    const arms = 4, step = Math.PI * 2 / arms, sa = -Math.PI / 2;
    const sw = Math.PI / 6, hw = 0.22, nearR = 0.12;
    for (let i = 0; i < arms; i++) {
        const a = sa + i * step, aS = a + sw;
        const px = -Math.sin(aS), py = Math.cos(aS);
        pts.push([Math.cos(a) * nearR + px * hw, Math.sin(a) * nearR + py * hw]);
        pts.push([Math.cos(aS)         + px * hw, Math.sin(aS)         + py * hw]);
        pts.push([Math.cos(aS)         - px * hw, Math.sin(aS)         - py * hw]);
        pts.push([Math.cos(a) * nearR - px * hw, Math.sin(a) * nearR - py * hw]);
    }
    return pts;
}

function makeTriquetraPts() {
    const pts = [];
    const arms = 3, step = Math.PI * 2 / arms, sa = -Math.PI / 2;
    for (let i = 0; i < arms; i++) {
        const a = sa + i * step;
        const px = Math.sin(a), py = -Math.cos(a);
        pts.push([Math.cos(a) * 0.12 + px * 0.10, Math.sin(a) * 0.12 + py * 0.10]);
        pts.push([Math.cos(a) * 0.62 + px * 0.60, Math.sin(a) * 0.62 + py * 0.60]);
        pts.push([Math.cos(a),                     Math.sin(a)]);
        pts.push([Math.cos(a) * 0.62 - px * 0.60, Math.sin(a) * 0.62 - py * 0.60]);
        pts.push([Math.cos(a) * 0.12 - px * 0.10, Math.sin(a) * 0.12 - py * 0.10]);
    }
    return pts;
}

function makeStarCrossPts() {
    const pts = [];
    const arms = 4, step = Math.PI * 2 / arms, sa = -Math.PI / 2;
    for (let i = 0; i < arms; i++) {
        const a = sa + i * step;
        const px = Math.sin(a), py = -Math.cos(a);
        pts.push([Math.cos(a) * 0.12 + px * 0.12, Math.sin(a) * 0.12 + py * 0.12]);
        pts.push([Math.cos(a) * 0.82 + px * 0.50, Math.sin(a) * 0.82 + py * 0.50]);
        pts.push([Math.cos(a),                     Math.sin(a)]);
        pts.push([Math.cos(a) * 0.82 - px * 0.50, Math.sin(a) * 0.82 - py * 0.50]);
        pts.push([Math.cos(a) * 0.12 - px * 0.12, Math.sin(a) * 0.12 - py * 0.12]);
    }
    return pts;
}

let audioCtx = null, masterGain = null, ballGain = null, reverbNode = null;

const MAX_SOUNDS_PER_FRAME = 3;

function makeNoiseBuffer() {
    const len = Math.floor(audioCtx.sampleRate * 0.1);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
}

function startAudio() {
    if (audioStarted) return;
    audioStarted = true;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const revLen = Math.floor(audioCtx.sampleRate * 1.6);
        const revBuf = audioCtx.createBuffer(2, revLen, audioCtx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
            const d = revBuf.getChannelData(ch);
            for (let i = 0; i < revLen; i++)
                d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / revLen, 2.8);
        }
        reverbNode = audioCtx.createConvolver();
        reverbNode.buffer = revBuf;

        const delay = audioCtx.createDelay(0.6);
        delay.delayTime.value = 0.22;
        const delayFB = audioCtx.createGain();
        delayFB.gain.value = 0.30;
        delay.connect(delayFB); delayFB.connect(delay);

        masterGain = audioCtx.createGain();
        masterGain.gain.value = audioMuted ? 0 : audioVol;
        reverbNode.connect(masterGain);
        delay.connect(masterGain);
        masterGain.connect(audioCtx.destination);

        ballGain = audioCtx.createGain();
        ballGain.gain.value = ballSoundMuted ? 0 : 1;
        ballGain.connect(audioCtx.destination);

        [[55, .06], [110, .04], [164.8, .025]].forEach(([f, g]) => {
            const osc = audioCtx.createOscillator();
            const gn  = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.value = f * (1 + (Math.random() - .5) * 0.004);
            gn.gain.value = g;
            osc.connect(gn); gn.connect(reverbNode);
            osc.start();
        });

        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.value = 0.33; lfoGain.gain.value = 0.028;
        lfo.connect(lfoGain); lfo.start();

        [[130.8, 0.022], [196.0, 0.016], [261.6, 0.011]].forEach(([freq, gain]) => {
            const p1 = audioCtx.createOscillator(), p2 = audioCtx.createOscillator();
            const pg = audioCtx.createGain();
            p1.type = p2.type = 'sawtooth';
            p1.frequency.value = freq; p2.frequency.value = freq * 1.004;
            pg.gain.value = gain;
            lfoGain.connect(pg.gain);
            p1.connect(pg); p2.connect(pg); pg.connect(reverbNode);
            p1.start(); p2.start();
        });

        noiseBuffer = makeNoiseBuffer();
        scheduleBeat();
        scheduleMelody(delay);
    } catch (e) { console.warn('Audio unavailable', e); }
}

const SCALE = [130.8, 146.8, 164.8, 196, 220, 261.6, 293.7, 329.6, 392, 440, 523.3, 587.3, 659.3, 784, 880, 1046.5];

function playNote(dest, freq, vol = 0.075, dur = 0.75) {
    if (!audioCtx || audioMuted) return;
    const osc = audioCtx.createOscillator();
    const filt = audioCtx.createBiquadFilter();
    const env = audioCtx.createGain();
    osc.type = 'sawtooth'; osc.frequency.value = freq;
    filt.type = 'lowpass'; filt.frequency.value = Math.min(freq * 5, 8000); filt.Q.value = 2;
    const t = audioCtx.currentTime;
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(vol, t + 0.022);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(filt); filt.connect(env); env.connect(dest);
    osc.start(t); osc.stop(t + dur + 0.05);
}

function playKick() {
    if (!audioCtx || audioMuted) return;
    const osc = audioCtx.createOscillator(), env = audioCtx.createGain();
    const t = audioCtx.currentTime;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(38, t + 0.22);
    env.gain.setValueAtTime(0.75, t);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 0.30);
    osc.connect(env); env.connect(masterGain);
    osc.start(t); osc.stop(t + 0.34);
}

function playBass() {
    if (!audioCtx || audioMuted) return;
    const osc = audioCtx.createOscillator(), env = audioCtx.createGain();
    const t = audioCtx.currentTime;
    osc.type = 'triangle'; osc.frequency.value = 65.4;
    env.gain.setValueAtTime(0.28, t);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
    osc.connect(env); env.connect(masterGain);
    osc.start(t); osc.stop(t + 0.46);
}

function playHihat(open) {
    if (!audioCtx || audioMuted || !noiseBuffer) return;
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer;
    const hp  = audioCtx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 7500;
    const env = audioCtx.createGain();
    const t   = audioCtx.currentTime;
    const dur = open ? 0.14 : 0.035;
    env.gain.setValueAtTime(open ? 0.06 : 0.04, t);
    env.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(hp); hp.connect(env); env.connect(masterGain);
    src.start(t);
}

const STEP_MS    = 250;
const KICK_STEPS = new Set([0, 4]);
const OPEN_STEPS = new Set([2, 6]);
let beatStep = 0;

function scheduleBeat() {
    if (audioCtx && !audioMuted) {
        if (KICK_STEPS.has(beatStep)) { playKick(); playBass(); }
        playHihat(OPEN_STEPS.has(beatStep));
    }
    beatStep = (beatStep + 1) % 8;
    setTimeout(scheduleBeat, STEP_MS);
}

function scheduleMelody(dest) {
    const freq = SCALE[Math.floor(Math.random() * SCALE.length)];
    playNote(dest, freq);
    if (Math.random() < 0.55) playNote(dest, freq * 1.5, 0.042, 0.55);
    if (Math.random() < 0.42) {
        const idx = Math.floor(Math.random() * SCALE.length);
        setTimeout(() => playNote(dest, SCALE[idx], 0.05, 0.55), 130);
    }
    setTimeout(() => scheduleMelody(dest), 180 + Math.random() * 420);
}

function playBallHit(speed, ballX) {
    if (!audioCtx || ballSoundMuted || !ballGain || ballSoundVol <= 0) return;
    if (soundsThisFrame >= MAX_SOUNDS_PER_FRAME) return;
    soundsThisFrame++;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    const pan = audioCtx.createStereoPanner();
    pan.pan.value = Math.max(-1, Math.min(1, (ballX - cx) / SHAPE_R));
    osc.type = 'sine';
    osc.frequency.value = Math.min(200 + speed * 38, 1800);
    const t   = audioCtx.currentTime;
    const vol = ballSoundVol * 0.22;
    env.gain.setValueAtTime(vol, t);
    env.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    osc.connect(env); env.connect(pan); pan.connect(ballGain);
    osc.start(t); osc.stop(t + 0.11);
}

function getCrossTipCenter(iVerts) {
    const n = iVerts.length;
    let maxD = 0, tipX = cx, tipY = cy, capIdx = 0;
    for (let i = 0; i < n; i++) {
        const a = iVerts[i], b = iVerts[(i + 1) % n];
        const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
        const d = Math.hypot(mx - cx, my - cy);
        if (d > maxD) { maxD = d; tipX = mx; tipY = my; capIdx = i; }
    }
    return { x: tipX, y: tipY, capIdx };
}

// Per-frame cache for custom arm tips (reset at start of update/draw)
let _armTipsCache = null;

// For custom shapes: find all arm tips as local distance maxima
function getCustomArmTips(iVerts) {
    if (_armTipsCache) return _armTipsCache;
    const n = iVerts.length;
    const dists = iVerts.map((v, i) => {
        const b = iVerts[(i + 1) % n];
        const mx = (v.x + b.x) / 2, my = (v.y + b.y) / 2;
        return { mx, my, d: Math.hypot(mx - cx, my - cy), idx: i };
    });
    const threshold = INNER_R * 0.55;
    const tips = [];
    for (let i = 0; i < n; i++) {
        const prev = dists[(i - 1 + n) % n].d;
        const curr = dists[i].d;
        const next = dists[(i + 1) % n].d;
        if (curr >= prev && curr > next && curr > threshold) {
            tips.push({ x: dists[i].mx, y: dists[i].my, capIdx: dists[i].idx });
        }
    }
    _armTipsCache = tips.length > 0 ? tips : [getCrossTipCenter(iVerts)];
    return _armTipsCache;
}

function getCrossTipForArm(iVerts, armIdx) {
    const shape = currentCrossShape;
    if (shape.custom || !shape.arms) {
        const tips = getCustomArmTips(iVerts);
        return tips[armIdx % tips.length];
    }
    const capIdx = (armIdx % shape.arms) * 3;
    const a = iVerts[capIdx], b = iVerts[(capIdx + 1) % iVerts.length];
    return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2, capIdx };
}

// ── Ball sprites ───────────────────────────────────────────────
function makeBallSprite(h, s, l, r) {
    const sz  = Math.ceil(r * 2) + 2;
    const oc  = (typeof OffscreenCanvas !== 'undefined')
        ? new OffscreenCanvas(sz, sz)
        : Object.assign(document.createElement('canvas'), { width: sz, height: sz });
    const oc2 = oc.getContext('2d');
    const o   = 1;
    const gr  = oc2.createRadialGradient(
        o + r - r * .32, o + r - r * .36, r * .06,
        o + r, o + r, r
    );
    gr.addColorStop(0,   '#fff');
    gr.addColorStop(0.3, `hsl(${h},${s}%,${l + 10}%)`);
    gr.addColorStop(1,   `hsl(${h},${s}%,${l - 22}%)`);
    oc2.beginPath();
    oc2.arc(o + r, o + r, r, 0, Math.PI * 2);
    oc2.fillStyle = gr;
    oc2.fill();
    // Asymmetric arc for visible spin
    oc2.save();
    oc2.beginPath();
    oc2.arc(o + r, o + r, r - 0.5, 0, Math.PI * 2);
    oc2.clip();
    oc2.globalAlpha = 0.44;
    oc2.strokeStyle = `hsl(${(h + 55) % 360},90%,90%)`;
    oc2.lineWidth   = Math.max(0.7, r * 0.14);
    oc2.lineCap     = 'round';
    oc2.beginPath();
    oc2.arc(o + r, o + r, r * 0.56, -Math.PI * 0.62, Math.PI * 0.28);
    oc2.stroke();
    oc2.restore();
    return oc;
}

function makeBall() {
    const a = Math.random() * Math.PI * 2;
    const d = Math.random() * SHAPE_R * 0.72;
    const { h, s, l } = currentBallTheme.getHSL();
    const r = Math.max(1, BALL_R + (Math.random() * 2 - 1) * sizeRandomness * BALL_R * 0.15);
    return {
        h, s, l, r,
        x: cx + Math.cos(a) * d,
        y: cy + Math.sin(a) * d,
        vx: (Math.random() * 2 - 1) * 4,
        vy: (Math.random() * 2 - 1) * 4,
        omega: 0, angle: 0,
        insideCross: false,
        sprite: makeBallSprite(h, s, l, r),
    };
}

function iconCrossPoints(shape) {
    const R = 13, O = 16;
    if (shape.custom) {
        return shape.pts.map(([nx, ny]) =>
            `${(O + nx * R * 0.85).toFixed(2)},${(O + ny * R * 0.85).toFixed(2)}`
        ).join(' ');
    }
    const { arms, armWidth, sa } = shape;
    const wr = armWidth * R;
    const step = 2 * Math.PI / arms, sinStep = Math.sin(step);
    const pts = [];
    for (let i = 0; i < arms; i++) {
        const a = sa + i * step, b = a + step;
        pts.push(`${(O + R * Math.cos(a) + wr * Math.sin(a)).toFixed(2)},${(O + R * Math.sin(a) - wr * Math.cos(a)).toFixed(2)}`);
        pts.push(`${(O + R * Math.cos(a) - wr * Math.sin(a)).toFixed(2)},${(O + R * Math.sin(a) + wr * Math.cos(a)).toFixed(2)}`);
        pts.push(`${(O + wr * (Math.cos(a) + Math.cos(b)) / sinStep).toFixed(2)},${(O + wr * (Math.sin(a) + Math.sin(b)) / sinStep).toFixed(2)}`);
    }
    return pts.join(' ');
}

function iconPoints(shape, R, ox, oy) {
    if (shape.custom) {
        const ca = Math.cos(shape.sa || 0), sinA = Math.sin(shape.sa || 0);
        return shape.pts.map(([nx, ny]) => {
            const rx = (nx * ca - ny * sinA) * R * 0.85;
            const ry = (nx * sinA + ny * ca)  * R * 0.85;
            return `${(ox + rx).toFixed(2)},${(oy + ry).toFixed(2)}`;
        }).join(' ');
    }
    const { sides, star, ir = 0.4, sa } = shape;
    if (star) {
        return Array.from({ length: sides * 2 }, (_, i) => {
            const r = i % 2 === 0 ? R : R * ir;
            const a = sa + i * Math.PI / sides;
            return `${(ox + r * Math.cos(a)).toFixed(2)},${(oy + r * Math.sin(a)).toFixed(2)}`;
        }).join(' ');
    }
    const n = sides === 0 ? 48 : sides;
    return Array.from({ length: n }, (_, i) => {
        const a = sa + i * 2 * Math.PI / n;
        return `${(ox + R * Math.cos(a)).toFixed(2)},${(oy + R * Math.sin(a)).toFixed(2)}`;
    }).join(' ');
}

function applySettings(s) {
    _suppressSave = true;
    const set = (id, val) => {
        if (val == null) return;
        const el = document.getElementById(id);
        if (el) { el.value = val; el.dispatchEvent(new Event('input')); }
    };
    set('sBalls',       s.balls);
    set('sBallSize',    s.ballSize);
    set('sGravity',     s.gravity);
    set('sBallSpeed',   s.ballSpeed);
    set('sShapeSpeed',  s.shapeSpeed);
    set('sShapeSize',   s.shapeSize);
    set('sCrossSize',   s.crossSize);
    set('sCrossSpeed',  s.crossSpeed);
    set('sAnimSpeed',   s.animSpeed ?? 5);
    set('sFogTrail',    s.fogTrail);
    set('sSizeRandom',  s.sizeRandomness);
    if (s.volume != null) {
        const el = document.getElementById('sVolume');
        el.value = s.volume; audioVol = s.volume / 100; trackBg(el);
    }
    if (s.ballSound != null) {
        const el = document.getElementById('sBallSound');
        el.value = s.ballSound; ballSoundVol = s.ballSound / 100; trackBg(el);
    }
    if (s.audioMuted != null && s.audioMuted !== audioMuted) {
        audioMuted = s.audioMuted;
        if (masterGain) masterGain.gain.value = audioMuted ? 0 : audioVol;
        document.getElementById('muteBtn').classList.toggle('muted', audioMuted);
    }
    if (s.ballSoundMuted != null && s.ballSoundMuted !== ballSoundMuted) {
        ballSoundMuted = s.ballSoundMuted;
        if (ballGain) ballGain.gain.value = ballSoundMuted ? 0 : 1;
        document.getElementById('ballMuteBtn').classList.toggle('muted', ballSoundMuted);
    }
    if (s.shapeIdx != null) shapeGrid.querySelectorAll('.shape-btn')[s.shapeIdx]?.click();
    if (s.crossIdx != null) document.querySelectorAll('#cross-grid .shape-btn')[s.crossIdx]?.click();
    if (s.themeId)    { const t = THEMES.find(x => x.id === s.themeId);       if (t) setTheme(t);          }
    if (s.ballThemeId){ const t = BALL_THEMES.find(x => x.id === s.ballThemeId); if (t) setBallTheme(t, false); }
    if (s.fogThemeId) { const t = FOG_THEMES.find(x => x.id === s.fogThemeId);   if (t) setFogTheme(t, false);  }
    if (s.crossHole != null) {
        crossHoleEnabled = !!s.crossHole;
        document.getElementById('crossHoleCheck').checked = crossHoleEnabled;
        if (!crossHoleEnabled) balls.forEach(b => { b.insideCross = false; });
    }
    if (s.crossHoleSize != null) {
        crossHoleHalf = s.crossHoleSize;
        const el = document.getElementById('sCrossHoleSize');
        el.value = crossHoleHalf; trackBg(el);
    }
    if (s.crossHoleTimeout != null) {
        const v = Math.min(Math.max(1, s.crossHoleTimeout), 10);
        crossHoleInterval = v * 1000;
        const el = document.getElementById('sCrossHoleTimeout');
        el.value = v; trackBg(el);
        document.getElementById('vCrossHoleTimeout').textContent = v + 's';
    }
    _suppressSave = false;
}

            const a = Math.random() * Math.PI * 2, d = INNER_R * (0.2 + Math.random() * 0.55);
            const x = cx + Math.cos(a) * d, y = cy + Math.sin(a) * d;
            if (insidePoly(x, y, iVerts)) {
                const b = balls.find(b => !b.insideCross);
                if (!b) break;
                b.x = x; b.y = y;
                b.vx = (Math.random() * 2 - 1) * 6;
                b.vy = (Math.random() * 2 - 1) * 6;
                b.insideCross = true;
                seeded++;
            }
        }
    } else {
        balls.forEach(b => { b.insideCross = false; });
    }
    saveSettings();
});

// ── Physics helpers ────────────────────────────────────────────
function shapeVerts(angle) {
    if (currentShape.custom) {
        const { pts } = currentShape;
        const ca = Math.cos(angle), sa = Math.sin(angle);
        return pts.map(([nx, ny]) => ({
            x: cx + (nx * ca - ny * sa) * SHAPE_R,
            y: cy + (nx * sa + ny * ca) * SHAPE_R,
        }));
    }
    const { sides, star, ir = 0.4 } = currentShape;
    const n = sides === 0 ? 48 : sides;
    if (star) {
        return Array.from({ length: n * 2 }, (_, i) => {
            const r = i % 2 === 0 ? SHAPE_R : SHAPE_R * ir;
            const a = angle + i * Math.PI / n;
            return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
        });
    }
    return Array.from({ length: n }, (_, i) => ({
        x: cx + SHAPE_R * Math.cos(angle + i * 2 * Math.PI / n),
        y: cy + SHAPE_R * Math.sin(angle + i * 2 * Math.PI / n),
    }));
}

function innerShapeVerts(angle) {
    const shape = currentCrossShape;
    const r = INNER_R;
    if (shape.custom) {
        const ca = Math.cos(angle), sa = Math.sin(angle);
        return shape.pts.map(([nx, ny]) => ({
            x: cx + (nx * ca - ny * sa) * r,
            y: cy + (nx * sa + ny * ca) * r,
        }));
    }
    const { arms, armWidth } = shape;
    const wr = armWidth * r;
    const step = 2 * Math.PI / arms, sinStep = Math.sin(step);
    const verts = [];
    for (let i = 0; i < arms; i++) {
        const a = angle + i * step, b = a + step;
        verts.push({ x: cx + r * Math.cos(a) + wr * Math.sin(a), y: cy + r * Math.sin(a) - wr * Math.cos(a) });
        verts.push({ x: cx + r * Math.cos(a) - wr * Math.sin(a), y: cy + r * Math.sin(a) + wr * Math.cos(a) });
        verts.push({ x: cx + wr * (Math.cos(a) + Math.cos(b)) / sinStep, y: cy + wr * (Math.sin(a) + Math.sin(b)) / sinStep });
    }
    return verts;
}

function insidePoly(px, py, verts) {
    let inside = false;
    for (let i = 0, j = verts.length - 1; i < verts.length; j = i++) {
        const { x: xi, y: yi } = verts[i], { x: xj, y: yj } = verts[j];
        if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi)
            inside = !inside;
    }
    return inside;
}

function respawnBall(ball) {
    const a = Math.random() * Math.PI * 2, d = Math.random() * SHAPE_R * 0.28;
    ball.x  = cx + Math.cos(a) * d;
    ball.y  = cy + Math.sin(a) * d;
    ball.vx = (Math.random() * 2 - 1) * 3;
    ball.vy = (Math.random() * 2 - 1) * 3;
    ball.omega = 0;
    ball.insideCross = false;
}

function wallCollide(ball, verts, wallSpin) {
    const n = verts.length;
    for (let i = 0; i < n; i++) {
        const a = verts[i], b = verts[(i + 1) % n];
        const edx = b.x - a.x, edy = b.y - a.y;
        const lenSq = edx * edx + edy * edy;
        if (!lenSq) continue;
        const t    = Math.max(0, Math.min(1, ((ball.x - a.x) * edx + (ball.y - a.y) * edy) / lenSq));
        const cpx  = a.x + t * edx, cpy = a.y + t * edy;
        const dx   = ball.x - cpx, dy  = ball.y - cpy;
        const dist = Math.hypot(dx, dy);
        if (dist < ball.r && dist > 0) {
            const nx  = dx / dist, ny  = dy / dist;
            const evx = -wallSpin * (cpy - cy), evy = wallSpin * (cpx - cx);
            const dvx = ball.vx - evx, dvy = ball.vy - evy;
            const vn  = dvx * nx + dvy * ny;
            if (vn < 0) {
                ball.vx -= 1.8 * vn * nx;
                ball.vy -= 1.8 * vn * ny;
                const tx = -ny, ty = nx;
                const vt = dvx * tx + dvy * ty - ball.omega * ball.r;
                const fj = 0.22 * vt;
                ball.vx -= fj * tx; ball.vy -= fj * ty;
                ball.omega += fj / ball.r;
                playBallHit(Math.hypot(ball.vx, ball.vy), ball.x);
            }
            ball.x += nx * (ball.r - dist);
            ball.y += ny * (ball.r - dist);
        }
    }
}

function crossWallCollide(ball, verts, wallSpin) {
    const n = verts.length;
    const ci = crossHoleTip ? crossHoleTip.capIdx : -1;
    const half = crossHoleHalf;
    for (let i = 0; i < n; i++) {
        if (ci >= 0) {
            let d = (i - ci + n) % n;
            if (d > n - d) d = n - d;
            if (d <= half) continue;
        }
        const a = verts[i], b = verts[(i + 1) % n];
        const edx = b.x - a.x, edy = b.y - a.y;
        const lenSq = edx * edx + edy * edy;
        if (!lenSq) continue;
        const t    = Math.max(0, Math.min(1, ((ball.x - a.x) * edx + (ball.y - a.y) * edy) / lenSq));
        const cpx  = a.x + t * edx, cpy = a.y + t * edy;
        const dx   = ball.x - cpx, dy  = ball.y - cpy;
        const dist = Math.hypot(dx, dy);
        if (dist < ball.r && dist > 0) {
            const nx  = dx / dist, ny  = dy / dist;
            const evx = -wallSpin * (cpy - cy), evy = wallSpin * (cpx - cx);
            const dvx = ball.vx - evx, dvy = ball.vy - evy;
            const vn  = dvx * nx + dvy * ny;
            if (vn < 0) {
                ball.vx -= 1.8 * vn * nx;
                ball.vy -= 1.8 * vn * ny;
                const tx = -ny, ty = nx;
                const vt = dvx * tx + dvy * ty - ball.omega * ball.r;
                const fj = 0.22 * vt;
                ball.vx -= fj * tx; ball.vy -= fj * ty;
                ball.omega += fj / ball.r;
                playBallHit(Math.hypot(ball.vx, ball.vy), ball.x);
            }
            ball.x += nx * (ball.r - dist);
            ball.y += ny * (ball.r - dist);
        }
    }
}

function containBallOutside(ball, innerVerts) {
    if (insidePoly(ball.x, ball.y, innerVerts)) {
        const dx = ball.x - cx, dy = ball.y - cy;
        const d  = Math.hypot(dx, dy) || 1;
        const nx = dx / d, ny = dy / d;
        const vn = ball.vx * nx + ball.vy * ny;
        if (vn < 0) { ball.vx -= 1.8 * vn * nx; ball.vy -= 1.8 * vn * ny; }
        ball.x += nx * ball.r * 2;
        ball.y += ny * ball.r * 2;
    }
}

function boundarySafety(ball) {
    const R_safe = SHAPE_R * (currentShape.custom ? 1.5 : 1.0);
    const dist   = Math.hypot(ball.x - cx, ball.y - cy);
    if (dist > R_safe - ball.r && dist > 0) {
        const nx = (ball.x - cx) / dist, ny = (ball.y - cy) / dist;
        ball.x = cx + nx * (R_safe - ball.r - 0.5);
        ball.y = cy + ny * (R_safe - ball.r - 0.5);
        const vn = ball.vx * nx + ball.vy * ny;
        if (vn > 0) { ball.vx -= 2 * vn * nx; ball.vy -= 2 * vn * ny; }
    }
}

function containBall(ball, verts) {
    if (!insidePoly(ball.x, ball.y, verts)) {
        const dx = cx - ball.x, dy = cy - ball.y;
        const d  = Math.hypot(dx, dy) || 1;
        const nx = dx / d, ny = dy / d;
        const vn = ball.vx * nx + ball.vy * ny;
        if (vn < 0) { ball.vx -= 1.8 * vn * nx; ball.vy -= 1.8 * vn * ny; }
        ball.x += nx * ball.r * 2;
        ball.y += ny * ball.r * 2;
    }
}

function ballCollide() {
    const cellSz = Math.max(BALL_R * 2, 1) * 2.6;
    const inv    = 1 / cellSz;
    const hash   = new Map();
    for (let i = 0; i < balls.length; i++) {
        const b = balls[i];
        const k = ((Math.floor(b.x * inv) & 0xFFFF) | ((Math.floor(b.y * inv) & 0xFFFF) << 16)) >>> 0;
        const cell = hash.get(k);
        if (cell) cell.push(i); else hash.set(k, [i]);
    }
    for (let i = 0; i < balls.length; i++) {
        const a  = balls[i];
        const gx = Math.floor(a.x * inv), gy = Math.floor(a.y * inv);
        for (let ddx = -1; ddx <= 1; ddx++) {
            for (let ddy = -1; ddy <= 1; ddy++) {
                const k    = (((gx + ddx) & 0xFFFF) | (((gy + ddy) & 0xFFFF) << 16)) >>> 0;
                const cell = hash.get(k);
                if (!cell) continue;
                for (let ci = 0; ci < cell.length; ci++) {
                    const j = cell[ci];
                    if (j <= i) continue;
                    const b    = balls[j];
                    const ex   = b.x - a.x, ey = b.y - a.y;
                    const d2   = ex * ex + ey * ey;
                    const diam = a.r + b.r;
                    if (d2 < diam * diam && d2 > 0) {
                        const d  = Math.sqrt(d2);
                        const nx = ex / d, ny = ey / d;
                        const ov = (diam - d) * 0.5;
                        a.x -= nx * ov; a.y -= ny * ov;
                        b.x += nx * ov; b.y += ny * ov;
                        const vn = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                        if (vn < 0) {
                            a.vx += vn * nx; a.vy += vn * ny;
                            b.vx -= vn * nx; b.vy -= vn * ny;
                            const tx = -ny, ty = nx;
                            const vt = (b.vx - a.vx) * tx + (b.vy - a.vy) * ty
                                     + (a.omega + b.omega) * (a.r + b.r) * 0.5;
                            const fj = 0.12 * vt;
                            a.vx += fj * tx; a.vy += fj * ty;
                            b.vx -= fj * tx; b.vy -= fj * ty;
                            a.omega -= fj / a.r * 0.5;
                            b.omega += fj / b.r * 0.5;
                        }
                    }
                }
            }
        }
    }
}

let lastVerts = null, lastInnerVerts = null;

function update() {
    _armTipsCache = null;
    soundsThisFrame = 0;
    if (crossHoleEnabled) {
        const now = performance.now();
        const iV0 = innerShapeVerts(innerShapeAngle);
        if (now >= crossHoleNextChange) {
            const numArms = currentCrossShape.custom
                ? getCustomArmTips(iV0).length
                : (currentCrossShape.arms || 4);
            crossHoleArmIdx = (crossHoleArmIdx + 1) % numArms;
            crossHoleNextChange = now + crossHoleInterval;
        }
        crossHoleTip = getCrossTipForArm(iV0, crossHoleArmIdx);
    } else {
        crossHoleTip = null;
    }
    const subSpin      = spin / SUBSTEPS;
    const subInnerSpin = innerSpin / SUBSTEPS;
    for (let s = 0; s < SUBSTEPS; s++) {
        shapeAngle      += subSpin;
        innerShapeAngle -= subInnerSpin;
        const verts  = shapeVerts(shapeAngle);
        const iVerts = innerShapeVerts(innerShapeAngle);
        if (s === SUBSTEPS - 1) { lastVerts = verts; lastInnerVerts = iVerts; }
        for (const ball of balls) {
            ball.vy += gravity / SUBSTEPS;
            let spd = Math.hypot(ball.vx, ball.vy);
            if (spd > maxBallSpeed) { const f = maxBallSpeed / spd; ball.vx *= f; ball.vy *= f; }
            ball.vx *= 0.9994; ball.vy *= 0.9994;
            ball.x  += ball.vx / SUBSTEPS;
            ball.y  += ball.vy / SUBSTEPS;
            ball.angle += ball.omega / SUBSTEPS;
            ball.omega *= 0.9985;
            wallCollide(ball, verts,  spin);
            if (crossHoleEnabled) {
                crossWallCollide(ball, iVerts, -innerSpin);
            } else {
                wallCollide(ball, iVerts, -innerSpin);
            }
            boundarySafety(ball);
            containBall(ball, verts);
            if (crossHoleEnabled) {
                ball.insideCross = insidePoly(ball.x, ball.y, iVerts);
            } else {
                ball.insideCross = false;
                containBallOutside(ball, iVerts);
            }
            spd = Math.hypot(ball.vx, ball.vy);
            if (spd > maxBallSpeed * 1.6) { const f = maxBallSpeed * 1.6 / spd; ball.vx *= f; ball.vy *= f; }
        }
        ballCollide();
    }
    if (trailLength > 0) {
        for (const ball of balls) {
            if (!ball.trail) ball.trail = [];
            ball.trail.push({ x: ball.x, y: ball.y });
            if (ball.trail.length > trailLength) ball.trail.shift();
        }
    }
}

// ── Portal dot (3D sphere like ball icon) ──────────────────────
function drawPortalDot(px, py, r) {
    const gr = ctx.createRadialGradient(
        px - r * 0.32, py - r * 0.35, r * 0.04,
        px, py, r
    );
    gr.addColorStop(0,    '#ffffff');
    gr.addColorStop(0.28, currentTheme.shapeStroke);
    gr.addColorStop(1,    currentTheme.shapeShadow);
    ctx.save();
    ctx.shadowBlur  = 28;
    ctx.shadowColor = currentTheme.shapeStroke;
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = gr; ctx.fill();
    // Specular highlight
    const hl = ctx.createRadialGradient(
        px - r * 0.30, py - r * 0.36, 0,
        px - r * 0.15, py - r * 0.18, r * 0.42
    );
    hl.addColorStop(0, 'rgba(255,255,255,.84)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI * 2);
    ctx.fillStyle = hl; ctx.fill();
    ctx.restore();
}

// ── Draw ───────────────────────────────────────────────────────
function getFogTint() {
    const t = currentFogTheme.tint;
    if (!t) return null;
    if (t === 'cycle') return `hsl(${(frameCount * 0.5) % 360},90%,50%)`;
    if (t === 'fast')  return `hsl(${(frameCount * 2.5) % 360},100%,65%)`;
    return `rgb(${t})`;
}

function draw() {
    _armTipsCache = null;
    const verts  = lastVerts      || shapeVerts(shapeAngle);
    const iVerts = lastInnerVerts || innerShapeVerts(innerShapeAngle);
    const { star, sides } = currentShape;
    const n = verts.length;

    if (bgFade > 0) {
        const fadeT = bgFade / 30;
        const smoothT = fadeT * fadeT * (3 - 2 * fadeT); // smoothstep: gentle at low/high ends
        ctx.globalAlpha = 1 - smoothT * 0.92;
        ctx.drawImage(bgCanvas, 0, 0);
        ctx.globalAlpha = 1;
        const tint = getFogTint();
        if (tint) {
            ctx.globalAlpha = smoothT * 0.10;
            ctx.fillStyle   = tint;
            ctx.fillRect(0, 0, W, H);
            ctx.globalAlpha = 1;
        }
    } else {
        ctx.drawImage(bgCanvas, 0, 0);
    }

    // Outer shape fill + border
    ctx.beginPath();
    verts.forEach((v, i) => i ? ctx.lineTo(v.x, v.y) : ctx.moveTo(v.x, v.y));
    ctx.closePath();
    ctx.fillStyle = currentTheme.shapeFill;
    ctx.fill();
    ctx.save();
    ctx.shadowBlur = 36; ctx.shadowColor = currentTheme.shapeShadow;
    ctx.strokeStyle = currentTheme.shapeStroke; ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();

    // Vertex dots + edge ticks
    if (!star && sides > 0 && sides <= 10) {
        verts.forEach(v => {
            ctx.save();
            ctx.shadowBlur = 8; ctx.shadowColor = currentTheme.dotShadow;
            ctx.beginPath(); ctx.arc(v.x, v.y, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = currentTheme.dotFill; ctx.fill();
            ctx.restore();
        });
        for (let i = 0; i < n; i++) {
            const a  = verts[i], b = verts[(i + 1) % n];
            const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
            const ex = b.x - a.x, ey = b.y - a.y, len = Math.hypot(ex, ey);
            let nx = ey / len, ny = -ex / len;
            if ((cx - mx) * nx + (cy - my) * ny < 0) { nx = -nx; ny = -ny; }
            ctx.beginPath(); ctx.moveTo(mx, my); ctx.lineTo(mx + nx * 10, my + ny * 10);
            ctx.strokeStyle = currentTheme.tick; ctx.lineWidth = 1.5; ctx.stroke();
        }
    }

    // "Ball Bouncer" logo — orbits a random arm, changing every 10-20 seconds
    {
        const nowLogo = performance.now();
        const iVertsLogo = lastInnerVerts || innerShapeVerts(innerShapeAngle);
        if (nowLogo >= logoNextChange) {
            const numA = currentCrossShape.custom
                ? getCustomArmTips(iVertsLogo).length
                : (currentCrossShape.arms || 4);
            let next;
            do { next = Math.floor(Math.random() * numA); } while (next === logoArmIdx && numA > 1);
            logoArmIdx = next;
            logoNextChange = nowLogo + 10000 + Math.random() * 10000;
        }
        const logoTip  = getCrossTipForArm(iVertsLogo, logoArmIdx);
        const tipX     = logoTip.x;
        const tipY     = logoTip.y;
        const tipAngle = Math.atan2(tipY - cy, tipX - cx);
        const logoSz   = Math.max(10, Math.min(22, INNER_R * 0.18));
        const logoX    = cx + Math.cos(tipAngle) * (INNER_R + logoSz * 1.6);
        const logoY    = cy + Math.sin(tipAngle) * (INNER_R + logoSz * 1.6);
        logoEl.style.left      = `${cachedAdW + logoX}px`;
        logoEl.style.top       = `${logoY}px`;
        logoEl.style.transform = `translate(-50%,-50%) rotate(${tipAngle + Math.PI / 2}rad)`;
        logoEl.style.fontSize  = `${logoSz}px`;
    }

    // Inner cross
    ctx.beginPath();
    iVerts.forEach((v, i) => i ? ctx.lineTo(v.x, v.y) : ctx.moveTo(v.x, v.y));
    ctx.closePath();
    ctx.fillStyle = currentTheme.shapeFill;
    ctx.fill();
    ctx.save();
    ctx.shadowBlur = 20; ctx.shadowColor = currentTheme.shapeShadow;
    ctx.strokeStyle = currentTheme.shapeStroke; ctx.lineWidth = 2;
    if (crossHoleEnabled && crossHoleTip) {
        const ni   = iVerts.length;
        const ci   = crossHoleTip.capIdx;
        const half = crossHoleHalf;
        let pathOpen = false;
        ctx.beginPath();
        for (let i = 0; i < ni; i++) {
            let d = (i - ci + ni) % ni;
            if (d > ni - d) d = ni - d;
            if (d <= half) { pathOpen = false; continue; }
            const a = iVerts[i], b = iVerts[(i + 1) % ni];
            if (!pathOpen) { ctx.moveTo(a.x, a.y); pathOpen = true; }
            ctx.lineTo(b.x, b.y);
        }
        ctx.stroke();
        // Portal dots — 3D spheres at gap terminations
        const gA = iVerts[(ci - half + ni) % ni];
        const gB = iVerts[(ci + half + 1) % ni];
        drawPortalDot(gA.x, gA.y, 7);
        drawPortalDot(gB.x, gB.y, 7);
    } else {
        ctx.stroke();
    }
    ctx.restore();

    // Comet trails
    if (trailLength > 0) {
        ctx.save();
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        const SEG = 6;
        for (const ball of balls) {
            if (!ball.trail || ball.trail.length < 2) continue;
            const full = [...ball.trail, { x: ball.x, y: ball.y }];
            const fLen = full.length;
            for (let s = 0; s < SEG; s++) {
                const frac = (s + 0.5) / SEG;
                const i0   = Math.floor(s * fLen / SEG);
                const i1   = Math.min(Math.floor((s + 1) * fLen / SEG), fLen - 1);
                if (i1 <= i0) continue;
                const hue = (ball.h + 90 * (1 - frac) + 360) % 360;
                const lgt = Math.min(ball.l + 10 + frac * 20, 95);
                ctx.globalAlpha = frac * frac * 0.85;
                ctx.lineWidth   = Math.max(0.5, ball.r * (0.12 + frac * 0.88) * 1.8);
                ctx.strokeStyle = `hsl(${hue},${ball.s}%,${lgt}%)`;
                ctx.shadowBlur  = s === SEG - 1 ? ball.r * 3 : 0;
                ctx.shadowColor = `hsl(${hue},${ball.s}%,85%)`;
                ctx.beginPath();
                ctx.moveTo(full[i0].x, full[i0].y);
                for (let t = i0 + 1; t <= i1; t++) {
                    if (t < fLen - 1) {
                        const mx = (full[t].x + full[t + 1].x) / 2;
                        const my = (full[t].y + full[t + 1].y) / 2;
                        ctx.quadraticCurveTo(full[t].x, full[t].y, mx, my);
                    } else {
                        ctx.lineTo(full[t].x, full[t].y);
                    }
                }
                ctx.stroke();
            }
        }
        ctx.restore();
    }

    // Balls with spin rotation (skip off-screen balls)
    for (const ball of balls) {
        if (ball.x + ball.r < 0 || ball.x - ball.r > W ||
            ball.y + ball.r < 0 || ball.y - ball.r > H) continue;
        const off = 1 + ball.r;
        ctx.save();
        ctx.translate(ball.x, ball.y);
        ctx.rotate(ball.angle);
        ctx.drawImage(ball.sprite, -off, -off);
        ctx.restore();
    }
}

    btns[Math.floor(Math.random() * btns.length)]?.click();
});
document.getElementById('rndBallTheme').addEventListener('click', () => {
    setBallTheme(BALL_THEMES[Math.floor(Math.random() * BALL_THEMES.length)]);
});
document.getElementById('rndFogTheme').addEventListener('click', () => {
    setFogTheme(FOG_THEMES[Math.floor(Math.random() * FOG_THEMES.length)]);
});
document.getElementById('rndTheme').addEventListener('click', () => {
    setTheme(THEMES[Math.floor(Math.random() * THEMES.length)]);
});

// ── Reset ──────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
    if (paused) { paused = false; pauseBtn.innerHTML = ICON_PAUSE; pauseBtn.classList.remove('paused'); }
    applySettings(DEFAULTS);
    localStorage.removeItem('bb');
    shapeAngle = 0; innerShapeAngle = 0;
    balls.forEach(respawnBall);
});

// ── Resize handler ─────────────────────────────────────────────
let _resizeSaveTimer = null;
window.addEventListener('resize', () => {
    const prevShapeR = SHAPE_R;
    resizeCanvas();
    if (prevShapeR > 0 && SHAPE_R !== prevShapeR) {
        const scale = SHAPE_R / prevShapeR;
        BALL_R = Math.max(3, Math.min(18, BALL_R * scale));
        const sEl = document.getElementById('sBallSize');
        sEl.value = Math.round(BALL_R);
        trackBg(sEl);
        document.getElementById('vBallSize').textContent = sEl.value;
        balls.forEach(ball => {
            ball.r      = clampedR();
            ball.sprite = makeBallSprite(ball.h, ball.s, ball.l, ball.r);
        });
    }
    bgCanvas.width  = Math.round(W * DPR); bgCanvas.height = Math.round(H * DPR);
    bgCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    INNER_R = SHAPE_R * 0.65 * (+document.getElementById('sCrossSize').value / 100);
    rebuildBgCanvas();
    balls.forEach(respawnBall);
    // Debounce save after resize settles
    clearTimeout(_resizeSaveTimer);
    _resizeSaveTimer = setTimeout(saveSettings, 500);
});

// ── Favicon ────────────────────────────────────────────────────
(function setFavicon() {
    const fc = document.createElement('canvas');
    fc.width = fc.height = 64;
    const fx = fc.getContext('2d');
    const cx = 32, cy = 32, hex = 27, crossR = 16, crossW = 5, ballR = 9;

    // Dark background
    fx.fillStyle = '#07071a';
    fx.fillRect(0, 0, 64, 64);

    // Hexagon
    fx.beginPath();
    for (let i = 0; i < 6; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 3;
        i ? fx.lineTo(cx + Math.cos(a) * hex, cy + Math.sin(a) * hex)
          : fx.moveTo(cx + Math.cos(a) * hex, cy + Math.sin(a) * hex);
    }
    fx.closePath();
    fx.strokeStyle = '#00d4ff'; fx.lineWidth = 2.5;
    fx.shadowColor = '#00d4ff'; fx.shadowBlur = 8;
    fx.stroke();

    // Cross (plus shape)
    fx.shadowColor = '#88aaff'; fx.shadowBlur = 5;
    fx.fillStyle = 'rgba(100,160,255,0.22)';
    fx.strokeStyle = 'rgba(100,180,255,0.55)'; fx.lineWidth = 1.5;
    fx.beginPath();
    fx.rect(cx - crossR, cy - crossW, crossR * 2, crossW * 2);
    fx.rect(cx - crossW, cy - crossR, crossW * 2, crossR * 2);
    fx.fill(); fx.stroke();

    // Colorful ball
    fx.shadowColor = '#ff66ff'; fx.shadowBlur = 14;
    const gr = fx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, ballR);
    gr.addColorStop(0,    '#ffffff');
    gr.addColorStop(0.25, '#ff88ff');
    gr.addColorStop(0.55, '#5533ff');
    gr.addColorStop(1,    '#000033');
    fx.beginPath(); fx.arc(cx, cy, ballR, 0, Math.PI * 2);
    fx.fillStyle = gr; fx.fill();

    // Specular highlight
    fx.shadowBlur = 0;
    const hl = fx.createRadialGradient(cx - 3.5, cy - 3.5, 0.5, cx - 2, cy - 2, 4);
    hl.addColorStop(0, 'rgba(255,255,255,.85)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    fx.beginPath(); fx.arc(cx - 2, cy - 2, 4, 0, Math.PI * 2);
    fx.fillStyle = hl; fx.fill();

    document.getElementById('favicon').href = fc.toDataURL();
})();

loadSettings();
updateHoleSizeMax();
// Randomize all themes on every startup
_suppressSave = true;
setTheme(THEMES[Math.floor(Math.random() * THEMES.length)]);
setBallTheme(BALL_THEMES[Math.floor(Math.random() * BALL_THEMES.length)]);
setFogTheme(FOG_THEMES[Math.floor(Math.random() * FOG_THEMES.length)]);
_suppressSave = false;

// ── Game loop ──────────────────────────────────────────────────
function loop() {
    if (!paused) { update(); frameCount++; }
    draw();
    requestAnimationFrame(loop);
}
loop();
</script>
